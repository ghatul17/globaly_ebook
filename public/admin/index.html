<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Globaly CMS</title>
  </head>
  <body>
    <script>window.CMS_MANUAL_INIT = true;</script>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      CMS.init({
        config: {
          local_backend: true,
          backend: {
            name: 'github',
            repo: 'ghatul17/globaly_ebook',
            branch: 'main',
            base_url: 'https://guide.globaly.app',
            auth_endpoint: 'api/auth',
          },
          site_url: 'https://guide.globaly.app',
          media_folder: 'public/images/blog',
          public_folder: '/images/blog',
          collections: [
            {
              name: 'blog',
              label: 'Blog Posts',
              folder: 'src/content/blog',
              create: true,
              slug: '{{year}}-{{month}}-{{day}}-{{slug}}',
              fields: [
                { label: 'Title', name: 'title', widget: 'string' },
                { label: 'Publish Date', name: 'date', widget: 'datetime' },
                { label: 'Author', name: 'author', widget: 'string', default: 'Globaly Team' },
                { label: 'Description', name: 'description', widget: 'text' },
                { label: 'Cover Image', name: 'cover', widget: 'image', required: false },
                { label: 'Tags', name: 'tags', widget: 'list', required: false, default: [] },
                { label: 'Body', name: 'body', widget: 'markdown' },
              ],
            },
          ],
        },
      });
    </script>
  </body>
</html>
