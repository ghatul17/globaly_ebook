local_backend: true

backend:
  name: github
  repo: ghatul17/globaly_ebook
  branch: main
  auth_endpoint: /api/auth

site_url: https://globaly.io
media_folder: public/images/blog
public_folder: /images/blog

collections:
  - name: blog
    label: Blog Posts
    folder: src/content/blog
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Publish Date, name: date, widget: datetime }
      - { label: Author, name: author, widget: string, default: Globaly Team }
      - { label: Description, name: description, widget: text }
      - label: Cover Image
        name: cover
        widget: image
        required: false
      - label: Tags
        name: tags
        widget: list
        required: false
        default: []
      - { label: Body, name: body, widget: markdown }
